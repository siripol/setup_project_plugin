name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract CHANGELOG section for this tag
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found"
            exit 1
          fi
          # Pull lines between `## [<tag>]` (anywhere in the line, allows trailing date)
          # and the next `## [` header. Write to file — never interpolate notes via
          # `${{ steps.x.outputs.notes }}` because GitHub Actions injects the raw text
          # into the shell script, and bash will try to interpret backticks, `$(...)`,
          # and special chars in the CHANGELOG body as commands.
          mkdir -p /tmp/release
          awk -v tag="$tag" '
            $0 ~ "^## \\[" tag "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release/notes.md

          if [ -s /tmp/release/notes.md ]; then
            echo "have_notes=true"  >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No CHANGELOG section found for ${tag}; falling back to auto-generated notes."
          fi

      - name: Create GitHub release (CHANGELOG notes)
        if: steps.changelog.outputs.have_notes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file /tmp/release/notes.md \
            --verify-tag

      - name: Create GitHub release (auto-generated notes fallback)
        if: steps.changelog.outputs.have_notes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
