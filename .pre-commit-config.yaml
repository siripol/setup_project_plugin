repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: end-of-file-fixer
        exclude: ^skills/sn-setup/templates/
      - id: trailing-whitespace
        exclude: ^skills/sn-setup/templates/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(scripts|tests)/.*\.py$

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/test_sn_init.py -q
        language: system
        pass_filenames: false
        stages: [pre-push]
